services:
  web:
    build: .
    ports:
      - "4000:4000"
    volumes:
      -.:/app
    environment:
      - FLASK_ENV=development
    
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin12345
      POSTGRES_DB: nota-fiscal-python

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d nota-fiscal-python"]
      interval: 10s
      timeout: 5
      retries: 5

    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: '512M'

    restart: always
    
      